<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="chrome-webstore-item" content="none">
        <meta name="devtools-config" content="/.well-known/appspecific/com.chrome.devtools.json">
        <title>{% block title %}PVS+Sonar Project Manager{% endblock %}</title>
        <link rel="shortcut icon" href="{{ url_for('static', path='ico.png') }}" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --primary-color: #6366f1;
                --primary-hover: #4f46e5;
                --secondary-color: #5c5ff6;
                --success-color: #10b981;
                --error-color: #ef4444;
                --warning-color: #f59e0b;
                --info-color: #3b82f6;
                --bg-gradient-start: #a1b7ff;
                --bg-gradient-end: #4b54a2;
                --card-bg: #ffffff;
                --text-primary: #1f2937;
                --text-secondary: #6b7280;
                --border-color: #e5e7eb;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
                --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }

            [data-theme="dark"] {
                --bg-gradient-start: #1a1a2e;
                --bg-gradient-end: #16213e;
                --card-bg: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --border-color: #334155;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
                --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.6), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
            }

            body {
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
                background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
                background-attachment: fixed;
                color: var(--text-primary);
                line-height: 1.6;
                padding: 20px;
            }

            .scroll-to-top {
                position: fixed;
                right: 1.5rem;
                bottom: 1.5rem;
                width: 48px;
                height: 48px;
                background: #0069d9;
                color: #fff;
                border: none;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.4rem;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2);
                opacity: 0;
                transition: opacity 0.3s ease, transform 0.3s ease;
            }

            /* Показать кнопку, когда пользователь уже прокрутил вниз */
            .scroll-to-top.visible {
                opacity: 1;
                transform: translateY(0);
            }

            /* При наведении — небольшое увеличение */
            .scroll-to-top:hover {
                background: #0053a6;
                transform: scale(1.1);
            }

            a {
                color: var(--primary-color);
                text-decoration: none;
                transition: all 0.3s ease;
            }

            a:hover {
                color: var(--primary-hover);
                text-decoration: underline;
            }

            a:focus {
                outline: 2px solid var(--primary-color);
                outline-offset: 2px;
                border-radius: 4px;
            }

            .flash-messages {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 1000;
                max-width: 400px;
            }

            .flash-message {
                position: relative;
                padding: 16px 48px 16px 20px;
                margin-bottom: 12px;
                border-radius: 12px;
                color: white;
                opacity: 0.95;
                box-shadow: var(--shadow-lg);
                animation: fadeIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                transition: all 0.3s ease;
                backdrop-filter: blur(10px);
                font-weight: 500;
            }

            .flash-success {
                background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%);
            }

            .flash-error {
                background: linear-gradient(135deg, var(--error-color) 0%, #dc2626 100%);
            }

            .flash-warning {
                background: linear-gradient(135deg, var(--warning-color) 0%, #d97706 100%);
            }

            .flash-info {
                background: linear-gradient(135deg, var(--info-color) 0%, #2563eb 100%);
            }

            .flash-close {
                position: absolute;
                top: 12px;
                right: 12px;
                background: rgba(255, 255, 255, 0.2);
                border: none;
                color: white;
                font-size: 20px;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                cursor: pointer;
                opacity: 0.8;
                transition: all 0.2s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                line-height: 1;
            }

            .flash-close:hover {
                opacity: 1;
                background: rgba(255, 255, 255, 0.3);
                transform: rotate(90deg);
            }

            @keyframes fadeIn {
                from { 
                    opacity: 0; 
                    transform: translateX(100px) scale(0.8); 
                }
                to { 
                    opacity: 0.95; 
                    transform: translateX(0) scale(1); 
                }
            }

            @keyframes fadeOut {
                from { 
                    opacity: 0.95; 
                    transform: translateX(0) scale(1);
                }
                to { 
                    opacity: 0; 
                    transform: translateX(100px) scale(0.8);
                    visibility: hidden; 
                }
            }

            .flash-message {
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            .flash-message:hover {
                transform: translateX(-8px) scale(1.02);
                opacity: 1 !important;
                box-shadow: var(--shadow-xl);
            }
            
            /* Анимация "покачивания" для важных сообщений */
            .flash-message.important {
                animation: shake 0.5s, fadeIn 0.4s;
            }
            
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
            
            /* Прогресс-бар для таймера */
            .flash-progress {
                position: absolute;
                bottom: 0;
                left: 0;
                height: 4px;
                background: linear-gradient(90deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.3));
                width: 100%;
                transform-origin: left;
                animation: progress 10s linear;
                border-radius: 0 0 12px 12px;
            }
            
            @keyframes progress {
                from { transform: scaleX(1); }
                to { transform: scaleX(0); }
            }

            /* Переключатель темы */
            .theme-toggle {
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 1001;
                background: var(--card-bg);
                border: 2px solid var(--border-color);
                border-radius: 50px;
                padding: 10px 16px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 10px;
                box-shadow: var(--shadow-md);
                transition: all 0.3s ease;
                font-size: 18px;
            }

            .theme-toggle:hover {
                transform: scale(1.05);
                box-shadow: var(--shadow-lg);
            }

            .theme-toggle:active {
                transform: scale(0.95);
            }

            .theme-icon {
                transition: transform 0.3s ease;
            }

            .theme-toggle:hover .theme-icon {
                transform: rotate(15deg);
            }

            @media (max-width: 768px) {
                .flash-messages {
                    top: 10px;
                    right: 10px;
                    left: 10px;
                    max-width: none;
                }

                .theme-toggle {
                    top: 10px;
                    left: 10px;
                    padding: 8px 12px;
                    font-size: 16px;
                }
            }
        </style>
        {% block extra_css %}{% endblock %}
    </head>
    <body>
        <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему" title="Переключить тему">
            <span class="theme-icon" id="themeIcon">🌓</span>
        </button>
        {% block content %}{% endblock %}          {% if flash_messages %}          <div class="flash-messages">
            {% for category, message in flash_messages %}
            <div class="flash-message flash-{{ category }}">
                {{ message }}
                <div class="flash-progress"></div>
                <button class="flash-close" aria-label="Закрыть">&times;</button>
            </div>
            {% endfor %}
        </div>            {% endif %}            <button class="scroll-to-top" aria-label="Прокрутить страницу в начало">
            ↑
        </button>

        <script>
            class FlashManager {
                constructor() {
                    this.messages = document.querySelectorAll('.flash-message');
                    this.init();
                }
                
                init() {
                    this.messages.forEach(message => {
                        const timerDuration = message.dataset.timer || 10000;
                        let timer = null;
                        
                        // Запускаем таймер
                        this.startTimer(message, timerDuration);
                        
                        // Обработчик для кнопки закрытия
                        const closeButton = message.querySelector('.flash-close');
                        if (closeButton) {
                            closeButton.addEventListener('click', () => {
                                this.removeMessage(message);
                                if (timer) clearTimeout(timer);
                            });
                        }
                        
                        // Пауза при наведении мыши
                        message.addEventListener('mouseenter', () => {
                            if (timer) clearTimeout(timer);
                        });
                        
                        // Возобновление таймера когда мышь уходит
                        message.addEventListener('mouseleave', () => {
                            this.startTimer(message, timerDuration);
                        });
                    });
                }
                
                startTimer(message, duration) {
                    return setTimeout(() => {
                        this.removeMessage(message);
                    }, duration);
                }
                
                removeMessage(message) {
                    message.style.opacity = '0';
                    setTimeout(() => {
                        message.remove();
                        
                        // Если не осталось сообщений, скрываем контейнер
                        if (document.querySelectorAll('.flash-message').length === 0) {
                            const container = document.querySelector('.flash-messages');
                            if (container) container.style.display = 'none';
                        }
                    }, 300);
                }
                
                // Метод для добавления новых сообщений (если нужно динамически добавлять)
                static addMessage(category, text, duration = 10000) {
                    const container = document.querySelector('.flash-messages') || 
                                    this.createContainer();
                    
                    const message = document.createElement('div');
                    message.className = `flash-message flash-${category}`;
                    message.innerHTML = `
                        ${text}
                        <button class="flash-close" aria-label="Закрыть">&times;</button>
                    `;
                    
                    container.appendChild(message);
                    new FlashManager(); // Реинициализируем для нового сообщения
                }
                
                static createContainer() {
                    const container = document.createElement('div');
                    container.className = 'flash-messages';
                    document.body.appendChild(container);
                    return container;
                }
            }
            
            // Управление темой
            class ThemeManager {
                constructor() {
                    this.themeToggle = document.getElementById('themeToggle');
                    this.themeIcon = document.getElementById('themeIcon');
                    this.init();
                }

                init() {
                    // Определяем системную тему
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    
                    // Проверяем сохранённую тему в localStorage
                    const savedTheme = localStorage.getItem('theme');
                    
                    // Устанавливаем тему: сохранённая > системная > светлая
                    let currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
                    
                    this.setTheme(currentTheme);
                    
                    // Обработчик клика на переключатель
                    if (this.themeToggle) {
                        this.themeToggle.addEventListener('click', () => {
                            this.toggleTheme();
                        });
                    }

                    // Слушаем изменения системной темы (только если нет сохранённой)
                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                        if (!localStorage.getItem('theme')) {
                            this.setTheme(e.matches ? 'dark' : 'light');
                        }
                    });
                }

                setTheme(theme) {
                    document.documentElement.setAttribute('data-theme', theme);
                    this.updateIcon(theme);
                    localStorage.setItem('theme', theme);
                }

                toggleTheme() {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    this.setTheme(newTheme);
                }

                updateIcon(theme) {
                    if (this.themeIcon) {
                        this.themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
                    }
                }
            }

            // Инициализация при загрузке документа
            document.addEventListener('DOMContentLoaded', () => {
                new FlashManager();
                new ThemeManager();
            });

            const btn = document.querySelector('.scroll-to-top');

            // Показать кнопку, когда пользователь прокручивает больше 300 px
            window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
            });

            // При клике плавно прокрутить к началу
            btn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'   // плавная анимация
            });
            });
        </script>
    </body>
</html>
