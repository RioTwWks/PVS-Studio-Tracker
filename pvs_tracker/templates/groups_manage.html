{% extends "base.html" %}
{% block title %}PVS-Tracker{% endblock %}
{% block content %}

<div class="sq-page-header sq-reveal mb-4">
    <h1 class="sq-page-title"><i class="bi bi-tags"></i> <span data-i18n="groups_page_title">Manage groups</span></h1>
    <p class="sq-page-subtitle" data-i18n="groups_page_subtitle">Configure group order and contents on the home page</p>
</div>

<div class="sq-card">
    <div class="sq-card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0" data-i18n="groups_list_title">Group list</h5>
    </div>
    <div class="sq-card-body">
        {% include "partials/global_groups_tab.html" %}
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    if (typeof initGroupsManagement === 'function') {
        initGroupsManagement();
    }
});
</script>

{% endblock %}
