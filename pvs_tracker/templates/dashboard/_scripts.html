<script>
    // SonarQube-style tab switching
    function switchProjectTab(tabName) {
        // Hide all tab contents
        document.querySelectorAll('.sq-project-tab-content').forEach(el => {
            el.style.display = 'none';
        });

        // Deactivate all tab buttons
        document.querySelectorAll('.sq-project-tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        // Show selected tab content
        const tabContent = document.getElementById('tab-' + tabName);
        if (tabContent) {
            tabContent.style.display = 'block';
        }

        // Activate tab button
        const tabBtn = document.querySelector(`.sq-project-tab-btn[data-tab="${tabName}"]`);
        if (tabBtn) {
            tabBtn.classList.add('active');
        }

        // If switching to code tab and it's empty, show hint
        if (tabName === 'code') {
            const codeViewer = document.getElementById('code-viewer-content');
            if (!codeViewer.querySelector('.sq-code-viewer')) {
                codeViewer.innerHTML = `
                    <div class="sq-empty-state text-center py-5">
                        <i class="bi bi-hand-index" style="font-size: 4rem; opacity: 0.3;"></i>
                        <p class="mt-3 mb-0">${I18n.t('code_tab_empty_hint')}</p>
                    </div>
                `;
            }
        }

        if (tabName === 'trends' && window.__pvsChart) {
            requestAnimationFrame(() => window.__pvsChart.resize());
        }

        if (tabName === 'issues') {
            loadIssuesTab();
        }
    }

    // Called when clicking code button on an issue
    function switchToCodeTab() {
        switchProjectTab('code');
    }

    async function saveSourceRoots() {
        const winInput = document.getElementById('source-root-win');
        const linuxInput = document.getElementById('source-root-linux');
        const status = document.getElementById('source-root-status');

        const winValue = winInput.value.trim();
        const linuxValue = linuxInput.value.trim();

        try {
            const response = await fetch('/api/v1/projects/{{ project.id }}/source-roots', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    source_root_win: winValue || null,
                    source_root_linux: linuxValue || null
                })
            });

            if (response.ok) {
                status.textContent = '✓ ' + I18n.t('saved');
                status.style.color = '#198754';
                status.style.display = 'inline';
            } else {
                const result = await response.json();
                status.textContent = '✗ ' + (result.detail || I18n.t('error'));
                status.style.color = '#dc3545';
                status.style.display = 'inline';
            }
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        } catch (error) {
            status.textContent = '✗ ' + I18n.t('network_error');
            status.style.color = '#dc3545';
            status.style.display = 'inline';
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        }
    }
</script>

<script>
    let issuesObserver = null;
    let issuesScrollArmed = false;

    function isIssuesTabActive() {
        const tab = document.getElementById('tab-issues');
        return tab && tab.style.display !== 'none';
    }

    function loadIssuesTab() {
        const container = document.getElementById('issues-table-full');
        if (!container || container.dataset.issuesLoaded === 'true') {
            initIssuesInfiniteScroll();
            return;
        }

        const url = container.dataset.issuesUrl;
        if (!url) {
            return;
        }

        container.dataset.issuesLoaded = 'true';
        issuesScrollArmed = false;
        const request = htmx.ajax('GET', url, {
            target: '#issues-table-full',
            swap: 'innerHTML',
        });
        if (request && typeof request.then === 'function') {
            request.then(() => initIssuesInfiniteScroll());
        }
    }

    function initIssuesInfiniteScroll() {
        if (issuesObserver) {
            issuesObserver.disconnect();
            issuesObserver = null;
        }

        const sentinel = document.getElementById('load-more-sentinel');
        if (!sentinel) {
            return;
        }

        issuesObserver = new IntersectionObserver((entries) => {
            const entry = entries[0];
            if (!entry || !entry.isIntersecting || !isIssuesTabActive() || !issuesScrollArmed || sentinel.dataset.loading === 'true') {
                return;
            }

            sentinel.dataset.loading = 'true';
            sentinel.dispatchEvent(new Event('pvs-load-more', { bubbles: true }));
        }, { root: null, rootMargin: '120px 0px', threshold: 0.01 });

        issuesObserver.observe(sentinel);
    }

    document.body.addEventListener('htmx:afterSwap', (event) => {
        if (event.detail && event.detail.target && event.detail.target.id === 'issues-table-full') {
            issuesScrollArmed = false;
            initIssuesInfiniteScroll();
        } else if (event.target && event.target.id === 'load-more-sentinel') {
            initIssuesInfiniteScroll();
        }
    });

    window.addEventListener('scroll', () => {
        if (isIssuesTabActive()) {
            issuesScrollArmed = true;
        }
    }, { passive: true });
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const historyData = JSON.parse('{{ history | tojson | safe }}');
        if (historyData && historyData.length > 0) {
            createTrendChart('trendChart', historyData);
            if (window.__pvsChart) {
                window.__pvsChart.resize();
            }
        }
    });
</script>
