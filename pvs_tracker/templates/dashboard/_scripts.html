<script>
    // SonarQube-style tab switching
    function switchProjectTab(tabName) {
        // Hide all tab contents
        document.querySelectorAll('.sq-project-tab-content').forEach(el => {
            el.style.display = 'none';
        });

        // Deactivate all tab buttons
        document.querySelectorAll('.sq-project-tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        // Show selected tab content
        const tabContent = document.getElementById('tab-' + tabName);
        if (tabContent) {
            tabContent.style.display = 'block';
        }

        // Activate tab button
        const tabBtn = document.querySelector(`.sq-project-tab-btn[data-tab="${tabName}"]`);
        if (tabBtn) {
            tabBtn.classList.add('active');
        }

        // If switching to code tab and it's empty, show hint
        if (tabName === 'code') {
            const codeViewer = document.getElementById('code-viewer-content');
            if (!codeViewer.querySelector('.sq-code-viewer')) {
                codeViewer.innerHTML = `
                    <div class="sq-empty-state text-center py-5">
                        <i class="bi bi-hand-index" style="font-size: 4rem; opacity: 0.3;"></i>
                        <p class="mt-3 mb-0">${I18n.t('code_tab_empty_hint')}</p>
                    </div>
                `;
            }
        }

        if (tabName === 'trends' && window.__pvsChart) {
            requestAnimationFrame(() => window.__pvsChart.resize());
        }

        if (tabName === 'issues') {
            loadIssuesTab(false);
        }
    }

    // Called when clicking code button on an issue
    function switchToCodeTab() {
        switchProjectTab('code');
    }

    async function saveQualityGate() {
        const select = document.getElementById('project-quality-gate');
        const status = document.getElementById('quality-gate-status');
        const gateId = select.value ? parseInt(select.value, 10) : null;
        try {
            const response = await fetch('/api/v2/projects/{{ project.id }}', {
                method: 'PATCH',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('token') || ''),
                },
                body: JSON.stringify({ quality_gate_id: gateId }),
            });
            if (response.ok) {
                status.textContent = '✓ ' + I18n.t('saved');
                status.style.color = '#198754';
                status.style.display = 'inline';
            } else {
                const result = await response.json();
                status.textContent = '✗ ' + (result.detail || I18n.t('error'));
                status.style.color = '#dc3545';
                status.style.display = 'inline';
            }
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        } catch (error) {
            status.textContent = '✗ ' + I18n.t('network_error');
            status.style.color = '#dc3545';
            status.style.display = 'inline';
        }
    }

    async function confirmDeleteProject() {
        const name = {{ project.name|tojson }};
        const message = I18n.t('delete_project_confirm').replace('{name}', name);
        const ok = await SqDialog.confirm({
            title: I18n.t('delete_project'),
            message,
            icon: 'trash',
            danger: true,
            confirmText: I18n.t('delete_project'),
        });
        if (ok) {
            document.getElementById('delete-project-form').submit();
        }
    }

    async function saveSourceRoots() {
        const winInput = document.getElementById('source-root-win');
        const linuxInput = document.getElementById('source-root-linux');
        const macosInput = document.getElementById('source-root-macos');
        const status = document.getElementById('source-root-status');

        const winValue = winInput.value.trim();
        const linuxValue = linuxInput.value.trim();
        const macosValue = macosInput ? macosInput.value.trim() : '';

        try {
            const response = await fetch('/api/v1/projects/{{ project.id }}/source-roots', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    source_root_win: winValue || null,
                    source_root_linux: linuxValue || null,
                    source_root_macos: macosValue || null,
                })
            });

            if (response.ok) {
                status.textContent = '✓ ' + I18n.t('saved');
                status.style.color = '#198754';
                status.style.display = 'inline';
            } else {
                const result = await response.json();
                status.textContent = '✗ ' + (result.detail || I18n.t('error'));
                status.style.color = '#dc3545';
                status.style.display = 'inline';
            }
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        } catch (error) {
            status.textContent = '✗ ' + I18n.t('network_error');
            status.style.color = '#dc3545';
            status.style.display = 'inline';
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        }
    }
</script>

<script>
    let issuesObserver = null;
    let issuesScrollArmed = false;

    function isIssuesTabActive() {
        const tab = document.getElementById('tab-issues');
        return tab && tab.style.display !== 'none';
    }

    function buildIssuesUrl() {
        const params = new URLSearchParams({
            project_id: String(window.PvsDashboard.projectId),
            platform_filter: window.PvsDashboard.platformFilter,
        });
        if (window.PvsDashboard.branch) {
            params.set('branch', window.PvsDashboard.branch);
        }
        return `/ui/issues?${params.toString()}`;
    }

    function loadIssuesTab(forceReload) {
        const container = document.getElementById('issues-table-full');
        if (!container) {
            return;
        }

        const url = buildIssuesUrl();
        container.dataset.issuesUrl = url;

        if (!forceReload && container.dataset.issuesLoaded === 'true') {
            initIssuesInfiniteScroll();
            return;
        }

        container.dataset.issuesLoaded = 'true';
        issuesScrollArmed = false;
        container.innerHTML = `
            <div class="sq-loading">
                <div class="spinner-border text-primary" role="status"></div>
                <span>${I18n.t('loading_issues')}</span>
            </div>`;

        const request = htmx.ajax('GET', url, {
            target: '#issues-table-full',
            swap: 'innerHTML',
        });
        if (request && typeof request.then === 'function') {
            request.then(() => initIssuesInfiniteScroll());
        }
    }

    function initIssuesInfiniteScroll() {
        if (issuesObserver) {
            issuesObserver.disconnect();
            issuesObserver = null;
        }

        const sentinel = document.getElementById('load-more-sentinel');
        if (!sentinel) {
            return;
        }

        issuesObserver = new IntersectionObserver((entries) => {
            const entry = entries[0];
            if (!entry || !entry.isIntersecting || !isIssuesTabActive() || !issuesScrollArmed || sentinel.dataset.loading === 'true') {
                return;
            }

            sentinel.dataset.loading = 'true';
            sentinel.dispatchEvent(new Event('pvs-load-more', { bubbles: true }));
        }, { root: null, rootMargin: '120px 0px', threshold: 0.01 });

        issuesObserver.observe(sentinel);
    }

    document.body.addEventListener('htmx:afterSwap', (event) => {
        if (event.detail && event.detail.target && event.detail.target.id === 'issues-table-full') {
            issuesScrollArmed = false;
            initIssuesInfiniteScroll();
        } else if (event.target && event.target.id === 'load-more-sentinel') {
            initIssuesInfiniteScroll();
        }
    });

    window.addEventListener('scroll', () => {
        if (isIssuesTabActive()) {
            issuesScrollArmed = true;
        }
    }, { passive: true });
</script>

<script>
    window.PvsDashboard = {
        projectId: {{ project.id }},
        branch: {{ active_branch|tojson }},
        platformFilter: {{ platform_filter|default('windows')|tojson }},
        _fileTreeLoaded: false,

        metricsQuery() {
            const params = new URLSearchParams({
                platform_filter: this.platformFilter,
            });
            if (this.branch) {
                params.set('branch', this.branch);
            }
            return params.toString();
        },

        codeOsPlatform() {
            const pf = this.platformFilter;
            if (pf === 'windows' || pf === 'linux' || pf === 'macos') {
                return pf;
            }
            return 'windows';
        },

        syncPlatformButtons() {
            document.querySelectorAll('[data-platform-filter]').forEach((btn) => {
                const filter = btn.dataset.platformFilter;
                const osOnly = !!btn.closest('[data-platform-switcher-os-only]');
                const active = osOnly
                    ? filter === this.codeOsPlatform()
                    : filter === this.platformFilter;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-pressed', String(active));
            });
        },

        updateUrl() {
            const url = new URL(window.location.href);
            url.searchParams.set('platform_filter', this.platformFilter);
            if (this.branch) {
                url.searchParams.set('branch', this.branch);
            } else {
                url.searchParams.delete('branch');
            }
            history.replaceState({}, '', url);
        },

        destroyTrendChart() {
            if (window.__pvsChart) {
                window.__pvsChart.destroy();
                window.__pvsChart = null;
            }
        },

        refreshTrendChart(metrics) {
            this.destroyTrendChart();
            const canvas = document.getElementById('trendChart');
            if (!canvas) {
                return;
            }
            const pf = metrics.platform_filter;
            const byPlatform = metrics.history_by_platform || {};
            if (pf === 'all' && Object.keys(byPlatform).length > 0) {
                createMultiPlatformTrendChart('trendChart', byPlatform);
            } else if (metrics.history && metrics.history.length > 0) {
                createTrendChart('trendChart', metrics.history);
                if (window.__pvsChart) {
                    initTrendChartFilters(window.__pvsChart);
                }
            }
            if (window.__pvsChart) {
                requestAnimationFrame(() => window.__pvsChart.resize());
            }
        },

        updateIssueBadges(total) {
            const headerCount = document.getElementById('issues-header-count');
            if (headerCount) {
                const totalLabel = typeof I18n !== 'undefined' ? I18n.t('total_lower') : 'total';
                headerCount.innerHTML = `${total} <span data-i18n="total_lower">${totalLabel}</span>`;
            }
            let badge = document.getElementById('issues-tab-badge');
            const issuesTabBtn = document.querySelector('.sq-project-tab-btn[data-tab="issues"]');
            if (issuesTabBtn) {
                if (total > 0) {
                    if (!badge) {
                        badge = document.createElement('span');
                        badge.id = 'issues-tab-badge';
                        badge.className = 'sq-tab-badge';
                        issuesTabBtn.appendChild(badge);
                    }
                    badge.textContent = String(total);
                    badge.style.display = '';
                } else if (badge) {
                    badge.remove();
                }
            }
        },

        async reloadIssues() {
            const container = document.getElementById('issues-table-full');
            if (!container) {
                return;
            }
            container.dataset.issuesLoaded = 'false';
            if (typeof loadIssuesTab === 'function') {
                loadIssuesTab(true);
            }
        },

        async reloadTrends() {
            const container = document.getElementById('trends-platform-content');
            if (!container) {
                return;
            }
            const query = this.metricsQuery();
            const [fragResp, metricsResp] = await Promise.all([
                fetch(`/ui/projects/${this.projectId}/trends-fragment?${query}`),
                fetch(`/api/v1/projects/${this.projectId}/platform-metrics?${query}`),
            ]);
            if (!fragResp.ok || !metricsResp.ok) {
                return;
            }
            container.innerHTML = await fragResp.text();
            const metrics = await metricsResp.json();
            this.refreshTrendChart(metrics);
        },

        async loadFileTree(force) {
            if (this._fileTreeLoaded && !force) {
                return;
            }
            const container = document.getElementById('file-tree');
            if (!container) {
                return;
            }
            container.innerHTML = `<div class="sq-loading">${I18n.t('loading_file_structure')}</div>`;

            const params = new URLSearchParams({ platform: this.codeOsPlatform() });
            if (this.branch) {
                params.append('branch', this.branch);
            }
            const url = `/api/projects/${this.projectId}/files?${params.toString()}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                if (typeof renderFileTree === 'function') {
                    container.innerHTML = renderFileTree(data.files || []);
                }
                this._fileTreeLoaded = true;
                const search = document.getElementById('file-search');
                if (search && search.value && typeof filterFileTree === 'function') {
                    filterFileTree(search.value);
                }
            } catch (error) {
                container.innerHTML =
                    `<div class="sq-alert sq-alert-danger">${I18n.t('error')}: ${error.message}</div>`;
                this._fileTreeLoaded = false;
            }
        },

        reloadCodeTreeIfVisible() {
            const codeTab = document.getElementById('tab-code');
            if (!codeTab || codeTab.style.display === 'none') {
                this._fileTreeLoaded = false;
                return;
            }
            const viewer = document.getElementById('inline-code-viewer');
            if (viewer) {
                viewer.style.display = 'none';
            }
            this._fileTreeLoaded = false;
            return this.loadFileTree(true);
        },

        async setPlatformFilter(platformFilter) {
            if (platformFilter === this.platformFilter) {
                return;
            }
            this.platformFilter = platformFilter;
            this.syncPlatformButtons();
            this.updateUrl();

            document.querySelectorAll('input[name="platform_filter"]').forEach((el) => {
                el.value = platformFilter;
            });

            const query = this.metricsQuery();
            const metricsResp = await fetch(
                `/api/v1/projects/${this.projectId}/platform-metrics?${query}`,
            );
            if (metricsResp.ok) {
                const metrics = await metricsResp.json();
                this.updateIssueBadges(metrics.issues_total || 0);
            }

            await Promise.all([
                this.reloadIssues(),
                this.reloadTrends(),
                this.reloadCodeTreeIfVisible(),
            ]);
        },
    };

    document.addEventListener('click', (event) => {
        const btn = event.target.closest('[data-platform-filter]');
        if (!btn || !window.PvsDashboard) {
            return;
        }
        event.preventDefault();
        window.PvsDashboard.setPlatformFilter(btn.dataset.platformFilter);
    });

    document.addEventListener('DOMContentLoaded', () => {
        window.PvsDashboard.syncPlatformButtons();

        const initialMetrics = {
            platform_filter: window.PvsDashboard.platformFilter,
            history: JSON.parse('{{ history | tojson | safe }}'),
            history_by_platform: JSON.parse('{{ history_by_platform | tojson | safe }}'),
        };
        window.PvsDashboard.refreshTrendChart(initialMetrics);

        const issuesContainer = document.getElementById('issues-table-full');
        if (issuesContainer) {
            issuesContainer.dataset.issuesUrl = buildIssuesUrl();
        }
    });
</script>
