    {# === Tab Content: Issues (SonarQube-style) === #}
    <div class="sq-project-tab-content" id="tab-issues" style="display: none;">
        {% include "dashboard/_platform_switcher.html" %}
        <div class="sq-issues-panel">
            <div id="issues-table-full"
                class="sq-issues-panel-inner"
                data-issues-url="/ui/issues?project_id={{ project.id }}&platform_filter={{ platform_filter|default('windows')|urlencode }}{% if active_branch %}&branch={{ active_branch|urlencode }}{% endif %}"
                data-issues-loaded="false">
                <div class="sq-loading">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden" data-i18n="loading_data">Loading...</span>
                    </div>
                    <span data-i18n="loading_issues">Loading issues...</span>
                </div>
            </div>
        </div>
    </div>
