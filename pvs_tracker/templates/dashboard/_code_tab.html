    {# === Tab Content: Code === #}
    <div class="sq-project-tab-content" id="tab-code" style="display: none;">
        <div class="sq-file-browser-container">
            {# Search #}
            <div class="sq-file-browser-search">
                <input type="text" id="file-search" class="sq-input" placeholder="Search files..." onkeyup="filterFileTree(this.value)">
            </div>
            
            {# File Tree #}
            <div id="file-tree" class="sq-file-tree">
                <div class="sq-loading">Loading file structure...</div>
            </div>
            
            {# Inline Code Viewer #}
            <div id="inline-code-viewer" class="sq-inline-code-viewer" style="display: none;">
                <div class="sq-code-viewer-header">
                    <span id="code-viewer-file-path" class="sq-file-name"></span>
                    <button class="sq-btn sq-btn-sm sq-btn-outline" onclick="closeCodeViewer()">
                        <i class="bi bi-x"></i> Close
                    </button>
                </div>
                <div id="code-viewer-content"></div>
            </div>
        </div>
    </div>

    <script>
    console.log("СҖСҹвҖқВ§ Code tab script loaded");

    let fileTreeLoaded = false;

    function loadFileTree() {
        if (fileTreeLoaded) {
            console.log("РІСҡвҖҰ Tree already loaded, skipping");
            return;
        }
        
        console.log("СҖСҹвҖңРҺ loadFileTree() called");
        const projectId = '{{ project.id }}';
        const runId = '{{ run_id if run_id else "" }}';
        const url = `/api/projects/${projectId}/files${runId ? '?run_id=' + runId : ''}`;
        
        console.log("СҖСҹвҖқвҖ” Fetching:", url);
        
        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log("РІСҡвҖҰ Data received, files:", data.files?.length);
                const container = document.getElementById('file-tree');
                if (container) {
                    container.innerHTML = renderFileTree(data.files || []);
                    fileTreeLoaded = true;
                    console.log("РІСҡвҖҰ Tree rendered");
                }
            })
            .catch(error => {
                console.error("СҖСҹвҖҷТҗ Error:", error);
                document.getElementById('file-tree').innerHTML = 
                    `<div class="sq-alert sq-alert-danger">Error: ${error.message}<br><small>Check console for details</small></div>`;
            });
    }

    function renderFileTree(items, level = 0) {
        if (!items || items.length === 0) {
            return '<div class="sq-empty-state">No files with warnings</div>';
        }
        
        let html = '<ul class="sq-file-tree-list" style="list-style:none;padding:0;margin:0;">';
        
        for (const item of items) {
            const indent = level * 20;
            const severityClass = item.severity === 'High' ? 'sq-sev-high' : 
                                item.severity === 'Medium' ? 'sq-sev-medium' : 'sq-sev-low';
            
            if (item.type === 'folder') {
                html += `
                    <li style="margin-left:${indent}px;">
                        <div class="sq-tree-item sq-folder" style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;" onclick="toggleFolder(this)">
                            <i class="bi bi-folder" style="color:#e6872a;"></i>
                            <span>${item.name.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                            <span class="sq-badge" style="margin-left:auto;background:#f0f0f0;color:#666;font-size:11px;">${item.total_warnings || 0}</span>
                        </div>
                        <div class="sq-folder-children" style="display:none;">
                            ${renderFileTree(item.children || [], level + 1)}
                        </div>
                    </li>
                `;
            } else {
                // СҖСҹвҖқвҖҳ Р вҖҳР вҖўР вҖ”Р СӣР СҹР С’Р РҺР СңР СӣР вҖў Р ВӯР СҷР В Р С’Р СңР ВҳР В Р СӣР вҖҷР С’Р СңР ВҳР вҖў: encodeURIComponent Р С‘РЎРғР С”Р В»РЎРӢРЎвҖЎР В°Р ВөРЎвҖҡ Р В»РЎРӢР ВұРЎвҖ№Р Вө Р С”Р С•Р Р…РЎвҖһР В»Р С‘Р С”РЎвҖҡРЎвҖ№ Р С”Р В°Р РҶРЎвҖ№РЎвҖЎР ВөР С”/РЎРғР В»Р ВөРЎвӮ¬Р ВөР в„–
                const encodedPath = encodeURIComponent(item.path || "");
                const displayPath = item.display_path || item.path || "";
                const fileName = displayPath.split(/[\\/]/).pop() || displayPath;
                const fileNameSafe = fileName.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                html += `
                    <li style="margin-left:${indent}px;">
                        <div class="sq-tree-item sq-file" style="display:flex;align-items:center;gap:8px;padding:4px 8px;cursor:pointer;" onclick="loadFileCode('${encodedPath}')">
                            <i class="bi bi-file-code" style="color:#6c757d;"></i>
                            <span title="${displayPath.replace(/</g, '&lt;').replace(/>/g, '&gt;')}">${fileNameSafe}</span>
                            <span class="sq-badge ${severityClass}" style="margin-left:auto;font-size:11px;">${item.warnings || 0}</span>
                        </div>
                    </li>
                `;
            }
        }
        html += '</ul>';
        return html;
    }

    function toggleFolder(el) {
        const children = el.nextElementSibling;
        const icon = el.querySelector('i');
        if (children.style.display === 'none') {
            children.style.display = 'block';
            icon.className = 'bi bi-folder-open';
        } else {
            children.style.display = 'none';
            icon.className = 'bi bi-folder';
        }
    }

    async function loadFileCode(encodedPath) {
        // СҖСҹвҖқвҖҳ Р вҖқР ВөР С”Р С•Р Т‘Р С‘РЎРӮРЎС“Р ВөР Сҳ Р С—РЎС“РЎвҖҡРЎРҠ Р С•Р ВұРЎРӮР В°РЎвҖҡР Р…Р С• Р РҶ Р Р…Р С•РЎРӮР СҳР В°Р В»РЎРҠР Р…РЎвҖ№Р в„– Р РҶР С‘Р Т‘
        const filePath = decodeURIComponent(encodedPath);
        console.log("СҖСҹвҖңвҖһ Loading:", filePath);
        
        const viewer = document.getElementById('inline-code-viewer');
        const content = document.getElementById('code-viewer-content');
        const pathLabel = document.getElementById('code-viewer-file-path');
        
        viewer.style.display = 'block';
        content.innerHTML = '<div class="sq-loading">Loading...</div>';
        pathLabel.textContent = filePath;
        
        try {
            const projectId = '{{ project.id }}';
            const runId = '{{ run_id if run_id else "" }}';
            
            // Р ВӨР С•РЎРӮР СҳР С‘РЎРӮРЎС“Р ВөР Сҳ URL Р ВұР ВөР В·Р С•Р С—Р В°РЎРғР Р…Р С• РЎвҖЎР ВөРЎРӮР ВөР В· URLSearchParams
            const params = new URLSearchParams({
                project_id: projectId,
                file_path: filePath,
            });
            if (runId) params.append('run_id', runId);
            
            const url = `/ui/file?${params.toString()}`;
            console.log("СҖСҹвҖқвҖ” Fetching:", url);
            
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            
            const html = await resp.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const codeViewer = doc.querySelector('.sq-code-viewer');
            
            if (codeViewer) {
                content.innerHTML = '';
                content.appendChild(codeViewer);
                viewer.scrollIntoView({behavior: 'smooth', block: 'start'});
                
                // СҖСҹвҖқвҖҳ Р ВҳР Р…Р С‘РЎвҖ Р С‘Р В°Р В»Р С‘Р В·Р В°РЎвҖ Р С‘РЎРҸ РЎРғР С”РЎРӮР С•Р В»Р В»Р В° Р Т‘Р В»РЎРҸ Р РҶР С”Р В»Р В°Р Т‘Р С”Р С‘ Code
                if (window.CodeViewer) {
                    window.CodeViewer.reset();
                    window.CodeViewer.init(codeViewer);
                }
                
                // СҖСҹвҖқвҖҳ Р ВҳР СңР ВҳР ВҰР ВҳР С’Р вҖәР ВҳР вҖ”Р С’Р ВҰР ВҳР РҮ PRISM.JS Р вҖқР вҖәР РҮ Р вҖқР ВҳР СңР С’Р СҡР ВҳР В§Р вҖўР РҺР СҷР СӣР вҖңР Сӣ Р СҷР СӣР СңР СһР вҖўР СңР СһР С’
                if (typeof Prism !== 'undefined') {
                    // Р СңР ВөР ВұР С•Р В»РЎРҠРЎвӮ¬Р В°РЎРҸ Р В·Р В°Р Т‘Р ВөРЎРӮР В¶Р С”Р В° РЎвҖЎРЎвҖҡР С•Р ВұРЎвҖ№ DOM РЎвҖҡР С•РЎвҖЎР Р…Р С• Р С•РЎвҖҡРЎРӮР ВөР Р…Р Т‘Р ВөРЎРӮР С‘Р В»РЎРғРЎРҸ
                    setTimeout(() => {
                        const codeEl = content.querySelector('code[class*="language-"]');
                        if (codeEl) {
                            Prism.highlightElement(codeEl);
                            console.log("СҖСҹРӢРҒ Prism highlighted code");
                        }
                    }, 50);
                }
            } else {
                content.innerHTML = '<div class="sq-alert sq-alert-danger">Failed to load code</div>';
            }
        } catch (e) {
            console.error("СҖСҹвҖҷТҗ Error:", e);
            content.innerHTML = `<div class="sq-alert sq-alert-danger">Error: ${e.message}</div>`;
        }
    }

    function closeCodeViewer() {
        document.getElementById('inline-code-viewer').style.display = 'none';
    }

    function filterFileTree(query) {
        const q = query.toLowerCase().trim();
        document.querySelectorAll('.sq-tree-item').forEach(item => {
            const name = item.textContent?.toLowerCase() || '';
            const li = item.closest('li');
            li.style.display = (name.includes(q) || !q) ? '' : 'none';
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        console.log("СҖСҹРӢРҮ DOMContentLoaded");
        const codeTabPane = document.getElementById('tab-code');
        if (codeTabPane && codeTabPane.classList.contains('active')) {
            console.log("СҖСҹвҖқвҖһ Code tab already active");
            setTimeout(loadFileTree, 100);
        }
    });
    </script>

    <style>
    .sq-file-tree { background:var(--sq-bg-secondary); border:1px solid var(--sq-border); border-radius:6px; padding:12px; max-height:500px; overflow-y:auto; }
    .sq-tree-item:hover { background:var(--sq-bg-hover); border-radius:4px; }
    .sq-sev-high { background:#fde8ec; color:#d4324f; }
    .sq-sev-medium { background:#fff3e0; color:#e6872a; }
    .sq-sev-low { background:#e8f5e9; color:#3fa950; }
    .sq-inline-code-viewer { border:1px solid var(--sq-border); border-radius:6px; margin-top:16px; background:var(--sq-bg-secondary); }
    .sq-code-viewer-header { display:flex; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--sq-border); background:var(--sq-bg-tertiary); }
    </style>
