    {# === Tab Content: Trends === #}
    <div class="sq-project-tab-content" id="tab-trends" style="display: none;">
        {% if history and history|length > 0 %}
        <div class="sq-card mb-4">
            <div class="sq-card-header">
                <i class="bi bi-graph-up"></i> Issue Trends
            </div>
            <div class="sq-card-body">
                <div class="sq-chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
                <div class="sq-chart-legend">
                    <span class="sq-legend-item"><span class="sq-legend-color" style="background: #dc3545;"></span> New</span>
                    <span class="sq-legend-item"><span class="sq-legend-color" style="background: #198754;"></span> Fixed</span>
                    <span class="sq-legend-item"><span class="sq-legend-color" style="background: #0d6efd;"></span> Total</span>
                </div>
            </div>
        </div>
        {% else %}
        <div class="sq-empty-state py-5">
            <div class="sq-empty-icon"><i class="bi bi-inbox" style="font-size: 4rem; opacity: 0.3;"></i></div>
            <h5 class="mt-3">No trend data yet</h5>
            <p class="text-muted">Upload your first PVS-Studio report to see issue trends</p>
        </div>
        {% endif %}
    </div>
