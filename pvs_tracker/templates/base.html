<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PVS-Tracker{% endblock %}</title>
    <link rel="icon" href="/static/ico.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js" defer></script>
    <!-- Custom Styles -->
    <link href="/static/style.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
</head>
<body>
    <!-- SonarQube-style Top Navigation Bar -->
    <header class="sq-header">
        <div class="sq-header-container">
            <div class="sq-header-left">
                <a href="/" class="sq-logo">
                    <img src="/static/ico.png" alt="PVS-Tracker" class="sq-logo-icon">
                    <span class="sq-logo-text">PVS-Tracker</span>
                </a>
            </div>
            <div class="sq-header-right">
                <button class="sq-header-btn" id="lang-toggle" onclick="I18n.toggle()" title="Switch language" aria-label="Switch language">
                    <i class="bi bi-translate"></i>
                    <span class="btn-label">EN</span>
                </button>
                <button class="sq-header-btn" onclick="ThemeManager.toggle()" title="Switch theme" aria-label="Switch theme">
                    <i class="bi bi-sun-fill sq-icon-sun"></i>
                    <i class="bi bi-moon-fill sq-icon-moon"></i>
                </button>
                {% if current_user %}
                <div class="sq-user-menu">
                    <div class="sq-user-avatar">
                        {{ current_user[0]|upper }}
                    </div>
                    <span class="sq-username">{{ current_user }}</span>
                    <a href="/logout" class="sq-header-btn" title="Logout">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                </div>
                {% else %}
                <a href="/login" class="sq-btn sq-btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i>
                    <span data-i18n="login">Login</span>
                </a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="sq-main">
        <div class="sq-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Prism.js for syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <!-- App JS -->
    <script src="/static/app.js"></script>
</body>
</html>
