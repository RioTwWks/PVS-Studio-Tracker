<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PVS-Tracker{% endblock %}</title>
    <link rel="icon" href="/static/ico.png" type="image/png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="/static/style.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check"></i> PVS-Tracker
            </a>
            <div class="d-flex align-items-center gap-2">
                <button class="lang-toggle" id="lang-toggle" onclick="I18n.toggle()" title="Переключить язык" aria-label="Переключить язык">
                    <span class="lang-label">EN</span>
                </button>
                <button class="theme-toggle" onclick="ThemeManager.toggle()" title="Переключить тему" aria-label="Переключить тему">
                    <span class="icon-sun"><i class="bi bi-sun-fill"></i></span>
                    <span class="icon-moon"><i class="bi bi-moon-fill"></i></span>
                </button>
                {% if current_user %}
                <span class="nav-item navbar-text text-white me-2">
                    <i class="bi bi-person-circle"></i> {{ current_user }}
                </span>
                <a class="nav-link text-white" href="/logout">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
                {% else %}
                <a class="nav-link text-white" href="/login">
                    <i class="bi bi-box-arrow-in-right"></i> Войти
                </a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="/static/app.js"></script>
</body>
</html>
