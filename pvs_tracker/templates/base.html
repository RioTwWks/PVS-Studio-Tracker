<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PVS-Tracker{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .severity-High { background-color: #f8d7da; }
        .severity-Medium { background-color: #fff3cd; }
        .severity-Low { background-color: #d1e7dd; }
        .status-new { color: #dc3545; font-weight: bold; }
        .status-fixed { color: #198754; }
        .status-ignored { color: #6c757d; text-decoration: line-through; }
        .htmx-request { opacity: 0.5; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🛡️ PVS-Tracker</a>
            <div class="navbar-nav ms-auto">
                {% if current_user %}
                <span class="nav-item navbar-text text-white me-3">👤 {{ current_user }}</span>
                <a class="nav-link text-white" href="/logout">Выйти</a>
                {% else %}
                <a class="nav-link text-white" href="/login">Войти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
