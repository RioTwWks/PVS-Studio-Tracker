{% for issue in issues %}
    {% include 'partials/issue_row.html' %}
{% endfor %}

{% if has_next %}
<tr id="load-more-sentinel"
    hx-get="/ui/issues?project_id={{ project_id }}&branch={{ branch|urlencode }}&severity={{ severity|urlencode }}&status_filter={{ status_filter|urlencode }}&q={{ q|urlencode }}&page={{ next_page }}&per_page=25&fragment=true&sort_by={{ sort_by }}&order={{ order }}"
    hx-trigger="revealed"
    hx-swap="outerHTML"
    hx-target="this"
    hx-include="none">
    <td colspan="9" class="text-center py-2">
        <div class="sq-loading">
            <span data-i18n="loading_data">Loading...</span>
        </div>
    </td>
</tr>
{% endif %}
