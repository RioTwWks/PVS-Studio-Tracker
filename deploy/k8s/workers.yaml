apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvs-tracker-worker-jenkins
  namespace: pvs-tracker
  labels:
    app: pvs-tracker-worker
    service: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pvs-tracker-worker
      service: jenkins
  template:
    metadata:
      labels:
        app: pvs-tracker-worker
        service: jenkins
    spec:
      containers:
        - name: worker
          image: pvs-tracker:0.2.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - pvs_tracker.rest_queue
            - --service
            - jenkins
          envFrom:
            - secretRef:
                name: pvs-tracker-secrets
          env:
            - name: REST_QUEUE_MODE
              value: external
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
