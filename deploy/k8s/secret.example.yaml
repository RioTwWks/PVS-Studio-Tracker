apiVersion: v1
kind: Secret
metadata:
  name: pvs-tracker-secrets
  namespace: pvs-tracker
type: Opaque
stringData:
  # Замените перед применением. DATABASE_URL обязателен (PostgreSQL).
  SECRET_KEY: change-me
  JWT_SECRET_KEY: change-me
  DATABASE_URL: postgresql+psycopg2://user:pass@postgres:5432/pvs_tracker
  WEBHOOK_USERNAME: builder
  WEBHOOK_PASSWORD: change-me
