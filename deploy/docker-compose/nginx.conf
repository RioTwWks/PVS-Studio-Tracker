# Конфиг для сервиса nginx в docker compose (НЕ для sudo nginx на хосте).
# DNS app-1/app-2 доступен только внутри сети compose.
# Проверка: docker compose exec nginx nginx -t

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS — отложенный resolve upstream при запросе (OSS nginx).
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream pvs_tracker {
        server app-1:8080 max_fails=3 fail_timeout=30s;
        server app-2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        client_max_body_size 512m;

        location /health/live {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health/ready {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
