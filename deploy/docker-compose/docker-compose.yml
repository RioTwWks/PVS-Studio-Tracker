# Скопируйте deploy/docker-compose/.env.example в .env рядом с этим файлом.
# Обязательно: DATABASE_URL на PostgreSQL, не SQLite.

x-app-build: &app-build
  context: ../..
  dockerfile: deploy/docker-compose/Dockerfile
  args:
    HTTP_PROXY: ${HTTP_PROXY:-}
    HTTPS_PROXY: ${HTTPS_PROXY:-}
    NO_PROXY: ${NO_PROXY:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pvs
      POSTGRES_PASSWORD: pvs
      POSTGRES_DB: pvs_tracker
    volumes:
      - pvs_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pvs -d pvs_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-1: &app
    build: *app-build
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://pvs:pvs@postgres:5432/pvs_tracker?sslmode=disable
      REST_QUEUE_MODE: external
      DB_CONNECT_TIMEOUT: "10"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    stop_grace_period: 45s

  app-2:
    <<: *app

  worker: &worker
    build: *app-build
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://pvs:pvs@postgres:5432/pvs_tracker?sslmode=disable
      REST_QUEUE_MODE: external
    depends_on:
      postgres:
        condition: service_healthy
      app-1:
        condition: service_healthy
    restart: unless-stopped

  worker-jenkins:
    <<: *worker
    command: ["python", "-m", "pvs_tracker.rest_queue", "--service", "jenkins"]

  worker-jira:
    <<: *worker
    command: ["python", "-m", "pvs_tracker.rest_queue", "--service", "jira"]

  worker-tfs:
    <<: *worker
    command: ["python", "-m", "pvs_tracker.rest_queue", "--service", "tfs"]

  worker-webhook:
    <<: *worker
    command: ["python", "-m", "pvs_tracker.rest_queue", "--service", "webhook"]

  worker-smtp:
    <<: *worker
    command: ["python", "-m", "pvs_tracker.rest_queue", "--service", "smtp"]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy

volumes:
  pvs_pg_data:
