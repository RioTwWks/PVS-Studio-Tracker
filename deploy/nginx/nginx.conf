worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Логи (путь для Windows: C:/nginx/logs/)
    access_log logs/pvs-tracker-access.log;
    error_log  logs/pvs-tracker-error.log;

    upstream pvs_tracker {
        # Пассивные health checks: после max_fails ошибок backend исключается на fail_timeout.
        # Для drain при обновлении добавьте "down" к серверу и выполните: nginx -s reload
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 512m;

        location /health/live {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health/ready {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Веб-хуки и upload могут обрабатываться долго (BackgroundTasks + Jenkins)
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
