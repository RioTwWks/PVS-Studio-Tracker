worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Автогенерация: deploy/nginx/sync-upstream.ps1 и watch-instances.ps1
    include upstream-active.conf;

    # Логи (путь для Windows: C:/nginx/logs/)
    access_log logs/pvs-tracker-access.log;
    error_log  logs/pvs-tracker-error.log;

    server {
        listen 8080;
        server_name _;

        client_max_body_size 512m;

        location /health/live {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health/ready {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://pvs_tracker;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Веб-хуки и upload могут обрабатываться долго (BackgroundTasks + Jenkins)
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
