# Override: PostgreSQL в Windows-контейнере вместо инстанса на хосте.
#
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d --build
#
# Windows Server Docker: DNS (postgres, host.docker.internal) и gateway NAT к published
# port часто не работают. Используем статический IP postgres в общей NAT-сети.

networks:
  pvs_internal:
    name: pvs-tracker-win
    driver: nat
    ipam:
      config:
        - subnet: 172.28.100.0/24
          gateway: 172.28.100.1

x-postgres-env: &postgres_env
  POSTGRES_STATIC_IP: ${POSTGRES_STATIC_IP:-172.28.100.10}
  DATABASE_URL: postgresql+psycopg2://pvs:${POSTGRES_PASSWORD:-pvs}@${POSTGRES_STATIC_IP:-172.28.100.10}:5432/pvs_tracker
  DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
  USE_HOST_GATEWAY_FOR_POSTGRES: "0"

services:
  postgres:
    build:
      context: ../..
      dockerfile: deploy/docker-compose-windows/Dockerfile.postgres
      args:
        WINDOWS_VERSION: ${WINDOWS_VERSION:-ltsc2019-amd64}
        USE_OFFLINE_DEPS: ${USE_OFFLINE_DEPS:-0}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    hostname: postgres
    networks:
      pvs_internal:
        ipv4_address: 172.28.100.10
    environment:
      POSTGRES_USER: pvs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pvs}
      POSTGRES_DB: pvs_tracker
    volumes:
      - ./pgdata:C:/pgsql/data
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test:
        - CMD
        - C:\pgsql\bin\pg_isready.exe
        - -h
        - 127.0.0.1
        - -p
        - "5432"
        - -U
        - postgres
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    restart: unless-stopped

  app-1:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  app-2:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-jenkins:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-jira:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-tfs:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-webhook:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-smtp:
    networks:
      - pvs_internal
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy
