# Override: PostgreSQL в Windows-контейнере вместо инстанса на хосте.
#
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d --build
#
# На Windows containers прямой TCP app -> postgres (172.17.x.x) часто таймаутит.
# DATABASE_URL идёт через host.docker.internal + опубликованный порт 5432.

x-postgres-env: &postgres_env
  DATABASE_URL: postgresql+psycopg2://pvs:${POSTGRES_PASSWORD:-pvs}@${POSTGRES_HOST:-host.docker.internal}:5432/pvs_tracker

services:
  postgres:
    build:
      context: ../..
      dockerfile: deploy/docker-compose-windows/Dockerfile.postgres
      args:
        WINDOWS_VERSION: ${WINDOWS_VERSION:-ltsc2019-amd64}
        USE_OFFLINE_DEPS: ${USE_OFFLINE_DEPS:-0}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    environment:
      POSTGRES_USER: pvs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pvs}
      POSTGRES_DB: pvs_tracker
    volumes:
      # Bind mount: на Windows named volume часто ломает initdb (Permission denied на ACL).
      # Сброс данных: docker compose down && Remove-Item -Recurse -Force .\pgdata
      - ./pgdata:C:/pgsql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD
        - C:\pgsql\bin\pg_isready.exe
        - -h
        - 127.0.0.1
        - -p
        - "5432"
        - -U
        - postgres
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    restart: unless-stopped

  app-1:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  app-2:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-jenkins:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-jira:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-tfs:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-webhook:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy

  worker-smtp:
    environment:
      <<: *postgres_env
    depends_on:
      postgres:
        condition: service_healthy
